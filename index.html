<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Repositorio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 450px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #24292e; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #444; }
        #panel { display: none; }
        .lista { margin-top: 20px; }
        .item-archivo { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            background: #fff; 
            border: 1px solid #eee; 
            margin-bottom: 8px; 
            border-radius: 6px;
        }
        .btn-abrir { 
            background: #28a745; 
            color: white; 
            text-decoration: none; 
            padding: 6px 12px; 
            border-radius: 4px; 
            font-size: 13px; 
        }
        .error { color: red; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div id="login">
        <h2>Acceso al Repositorio</h2>
        <input type="text" id="u" placeholder="Usuario">
        <input type="password" id="p" placeholder="Contraseña">
        <button class="btn" onclick="validar()">Entrar</button>
        <p id="msg" class="error"></p>
    </div>

    <div id="panel">
        <h2 id="titulo"></h2>
        <p><strong>Archivos detectados en /paginas:</strong></p>
        <div id="lista-archivos" class="lista">
            Cargando archivos del repositorio...
        </div>
        <br>
        <button onclick="location.reload()" style="background:#666" class="btn">Cerrar Sesión</button>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const USER_GIT = "TU_USUARIO_GITHUB"; // Cambia esto
    const REPO_GIT = "NOMBRE_DE_TU_REPO"; // Cambia esto
    const CARPETA = "paginas"; // Carpeta donde subirás tus HTML manualmente

    function validar() {
        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;

        if(user === "admin" && pass === "admin") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
            document.getElementById('titulo').innerText = "Panel de " + user;
            listarArchivos();
        } else {
            document.getElementById('msg').innerText = "Usuario o clave incorrecta";
        }
    }

    async function listarArchivos() {
        const contenedor = document.getElementById('lista-archivos');
        const urlApi = `https://api.github.com/repos/${USER_GIT}/${REPO_GIT}/contents/${CARPETA}`;

        try {
            const respuesta = await fetch(urlApi);
            const datos = await respuesta.json();

            if (Array.isArray(datos)) {
                contenedor.innerHTML = "";
                datos.forEach(archivo => {
                    // Solo mostramos archivos .html
                    if (archivo.name.endsWith('.html')) {
                        const div = document.createElement('div');
                        div.className = 'item-archivo';
                        div.innerHTML = `
                            <span>${archivo.name}</span>
                            <a href="${archivo.name}" class="btn-abrir" target="_blank">Acceder</a>
                        `;
                        // La URL de acceso en GitHub Pages suele ser: carpeta/archivo.html
                        div.querySelector('a').href = `./${CARPETA}/${archivo.name}`;
                        contenedor.appendChild(div);
                    }
                });
            } else {
                contenedor.innerHTML = "No se encontraron archivos en la carpeta /paginas";
            }
        } catch (e) {
            contenedor.innerHTML = "Error al conectar con GitHub API.";
        }
    }
</script>

</body>
</html>
