<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COPLA LTDA</title>
    <style>
        :root {
            --primary-color: #24292e;
            --success-color: #28a745;
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.2);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px 0;
            border: 1px solid #d1d5da;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #444;
        }

        .btn-logout {
            background-color: #f3f4f6;
            color: #d73a49;
            margin-top: 20px;
        }

        #panel-admin {
            display: none;
        }

        .file-list-container {
            margin-top: 20px;
            border-top: 1px solid #e1e4e8;
            padding-top: 20px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #fff;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            margin-bottom: 10px;
            transition: transform 0.1s;
        }

        .file-item:hover {
            background-color: #f9fafb;
        }

        .file-name {
            font-size: 14px;
            color: #24292e;
            word-break: break-all;
            margin-right: 10px;
        }

        .btn-open {
            background-color: var(--success-color);
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            white-space: nowrap;
        }

        .error-msg {
            color: #d73a49;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            color: #586069;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h2>OOPLA</h2>
        <div id="error-login" class="error-msg"></div>
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button class="btn btn-primary" onclick="handleLogin()">Ingresar</button>
    </div>

    <div id="panel-admin">
        <h2 id="welcome-text">Archivos</h2>
        <p style="font-size: 14px; color: #586069;">Archivos detectados en <strong>/paginas</strong>:</p>
        
        <div id="file-list" class="file-list-container">
            <div class="loading">Consultando repositorio...</div>
        </div>

        <button class="btn btn-logout" onclick="location.reload()">Cerrar Sesión</button>
    </div>
</div>

<script>
    // Configuración de tu repositorio según las imágenes enviadas
    const CONFIG = {
        username: "coplapaliaga",
        repo: "DIPL4",
        folder: "paginas"
    };

    function handleLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        if (u === "admin" && p === "Copla2026") {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('panel-admin').style.display = 'block';
            document.getElementById('welcome-text').innerText = "Panel de " + u;
            fetchFiles();
        } else {
            document.getElementById('error-login').innerText = "Usuario o clave incorrectos";
        }
    }

    async function fetchFiles() {
        const listElement = document.getElementById('file-list');
        const apiUrl = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${CONFIG.folder}`;

        try {
            const response = await fetch(apiUrl);
            
            if (!response.ok) {
                throw new Error("No se pudo conectar con la carpeta");
            }

            const files = await response.json();
            listElement.innerHTML = ""; // Limpiar mensaje de carga

            if (Array.isArray(files) && files.length > 0) {
                files.forEach(file => {
                    // Solo listamos archivos (ignoramos carpetas si las hay)
                    if (file.type === "file") {
                        const item = document.createElement('div');
                        item.className = 'file-item';
                        
                        // URL de GitHub Pages: https://usuario.github.io/repo/carpeta/archivo
                        const fileUrl = `https://${CONFIG.username}.github.io/${CONFIG.repo}/${CONFIG.folder}/${encodeURIComponent(file.name)}`;

                        item.innerHTML = `
                            <span class="file-name">${file.name}</span>
                            <a href="${fileUrl}" class="btn-open" target="_blank">Abrir</a>
                        `;
                        listElement.appendChild(item);
                    }
                });
            } else {
                listElement.innerHTML = '<div class="loading">No se encontraron archivos en la carpeta /paginas</div>';
            }

        } catch (error) {
            console.error(error);
            listElement.innerHTML = '<div class="error-msg">Error al cargar archivos. Revisa la consola (F12).</div>';
        }
    }
</script>

</body>
</html>
